<!DOCTYPE html>

<html>
<head>
    <Title>Calculator</title>
    <link rel="stylesheet" type="text/css" href="assets/calc_style.css"/>
    <script language="JavaScript" src="code.js" type="text/javascript"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="assets/favicon.png"/>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
</head>
<body>
    <div id="calculator">
        <h1>Calculator</h1>
        <p id="last_operation_history"></p>
        <p id="box" class="box">0</p>
        <table id="table">
            <tr>
                <td><button onclick="calculator.handleNumber('%')">%</button></td>
                <td><button onclick="calculator.clearEntry()">CE</button></td>
                <td><button onclick="calculator.clearAll()">C</button></td>
                <td><button id="backspace_btn" onclick="calculator.backspace()"></button></td>
            </tr>
            <tr>
                <td><button onclick="calculator.handleNumber('1/x')">¹∕ₓ</button></td>
                <td><button onclick="calculator.handleNumber('x²')">𝑥²</button></td>
                <td><button onclick="calculator.handleNumber('√')">√𝑥</button></td>
                <td><button id="plusOp" value="+" class="operator" onclick="calculator.handleNumber('+')">+</button></td>
            </tr>
            <tr>
                <td><button onclick="calculator.handleNumber('7')">7</button></td>
                <td><button onclick="calculator.handleNumber('8')">8</button></td>
                <td><button onclick="calculator.handleNumber('9')">9</button></td>
                <td><button id="subOp" value="-" class="operator" onclick="calculator.handleNumber('-')">-</button></td>
            </tr>
            <tr>
                <td><button onclick="calculator.handleNumber('4')">4</button></td>
                <td><button onclick="calculator.handleNumber('5')">5</button></td>
                <td><button onclick="calculator.handleNumber('6')">6</button></td>
                <td><button id="multiOp" value="*" class="operator" onclick="calculator.handleNumber('*')">×</button></td>
            </tr>
            <tr>
                <td><button onclick="calculator.handleNumber('1')">1</button></td>
                <td><button onclick="calculator.handleNumber('2')">2</button></td>
                <td><button onclick="calculator.handleNumber('3')">3</button></td>            
                <td><button id="divOp" value="/" class="operator" onclick="calculator.handleNumber('/')">÷</button></td>
            </tr>
            <tr>
                <td><button onclick="calculator.handleNumber('±')">±</button></td>
                <td><button onclick="calculator.handleNumber('0')">0</button></td>
                <td><button id="dot" value="." onclick="calculator.handleNumber('.')">.</button></td>
                <td colspan="4"><button value="=" class="operator" id="equal_sign" onclick="calculator.handleNumber('=')">=</button></td>
            </tr>
        </table>
    </div>
</body>
</html>
